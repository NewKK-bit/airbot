name: Sync Notion → prices.json (선택/레거시)

# [참고] 기본 데이터 수집은 collect-prices.yml(SerpApi)이 담당합니다.
# 이 워크플로는 가격을 Notion에 직접 입력하는 방식을 선호할 때만 쓰는 대안이며,
# prices.json 충돌을 막기 위해 자동 스케줄 없이 수동 실행(dispatch) 전용입니다.

on:
  workflow_dispatch:          # 수동 실행 전용 (자동 스케줄 없음)

permissions:
  contents: write

concurrency:
  group: sync-notion
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Notion 동기화 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ROUTES_DB: ${{ secrets.NOTION_ROUTES_DB }}
          NOTION_PRICES_DB: ${{ secrets.NOTION_PRICES_DB }}
        run: node scripts/sync-notion.mjs

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/prices.json)" ]; then
            git add data/prices.json
            git commit -m "chore: sync prices from Notion [skip ci]"
            git push
          else
            echo "변경사항 없음"
          fi
