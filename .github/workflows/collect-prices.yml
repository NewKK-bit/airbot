name: Collect prices (SerpApi)

# data/routes.json 의 관심 노선을 SerpApi(Google Flights)로 조회해
# data/prices.json 을 갱신·커밋합니다. 키는 Secrets에만 저장되어 정적 사이트엔 노출되지 않습니다.

on:
  schedule:
    - cron: "0 21 * * *"    # 매일 UTC 21:00 = KST 06:00
  workflow_dispatch:          # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

concurrency:
  group: collect-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 가격 수집 실행
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/collect-serpapi.mjs

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/prices.json)" ]; then
            git add data/prices.json
            git commit -m "chore: collect prices via SerpApi [skip ci]"
            git push
          else
            echo "변경사항 없음"
          fi
