<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모니터링 — AirBot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <div class="container">
      <div class="section" style="margin-top:28px">
        <div class="section-head">
          <div>
            <h2>가격 모니터링 대시보드</h2>
            <div class="sub" id="genInfo">관심 노선의 가격 추이를 한눈에</div>
          </div>
          <button class="btn btn-primary" id="addBtn" style="flex:none"></button>
        </div>
        <div class="stats-row" id="statsRow"></div>
      </div>

      <div class="section">
        <div class="section-head">
          <h2>관심 노선</h2>
          <span class="sub" id="routeCount"></span>
        </div>
        <div class="route-grid" id="routeGrid"></div>
        <div id="emptyState"></div>
        <p id="hiddenInfo" style="display:none;margin-top:14px;text-align:center;font-size:.86rem;color:var(--text-3)">
          숨긴 수집 노선 <span id="hiddenCount"></span>개 —
          <a href="#" id="restoreLink" style="color:var(--blue-500);font-weight:600">모두 복원</a>
        </p>
      </div>

      <p class="data-note">
        <strong>관심 노선 추가</strong>로 등록하면 앱을 열 때마다 Google Flights 가격으로 자동 갱신됩니다(1인당 기준).
        가격 기록은 이 브라우저에 저장돼 추이가 쌓입니다. 언제든 편집·삭제할 수 있어요.
      </p>
    </div>
  </main>

  <script src="js/deeplink.js"></script>
  <script src="js/data.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/routeform.js"></script>
  <script>
  (async function () {
    injectHeader("watch");
    await loadAirports();
    const $ = (id) => document.getElementById(id);
    $("addBtn").innerHTML = ICONS.plus + " 관심 노선 추가";

    let data, hidden;
    async function reload() {
      data = await FlightData.loadData();
      hidden = FlightData.getHidden();
      $("genInfo").textContent = AirApi.isConfigured()
        ? "추가한 노선을 앱을 열 때마다 자동으로 최신 가격으로 갱신합니다"
        : "⚠️ 실시간 자동 갱신을 켜려면 검색 페이지 ⚙️에서 프록시를 설정하세요";
      renderGrid();
    }

    const visibleRoutes = () => data.routes.filter((r) => r._local || !hidden.has(r.id));

    /* 프록시로 실시간 조회 → 저장 (로컬 노선은 히스토리 누적) */
    async function fetchLiveFor(route, silent) {
      if (!AirApi.isConfigured()) {
        if (!silent) toast("실시간 조회는 검색 페이지의 ⚙️ 실시간 검색 설정 후 가능해요");
        return false;
      }
      const q = DeepLink.routeToQuery(route);
      const live = await AirApi.searchLive(q);
      AirApi.saveLive(route.id, live);
      if (route._local && live.cheapest != null) FlightData.addHist(route.id, AirApi.kstToday(), live.cheapest);
      return true;
    }

    /* ---------- 요약 통계 ---------- */
    function renderStats() {
      const routes = visibleRoutes();
      if (!routes.length) { $("statsRow").innerHTML = ""; return; }
      const allStats = routes.map((r) => ({ route: r, s: FlightData.routeStats(r) }));
      const hits = allStats.filter((x) => x.s.hitTarget).length;
      const dropping = allStats.filter((x) => x.s.deltaFromPrev < 0).length;
      const bestDeal = allStats
        .filter((x) => x.s.current != null && x.route.targetPrice)
        .sort((a, b) => (a.s.current - a.route.targetPrice) - (b.s.current - b.route.targetPrice))[0];
      const stats = [
        { k: "모니터링 노선", v: routes.length + "개", d: `${dropping}개 노선 가격 하락중` },
        { k: "목표가 도달", v: hits + "개", d: hits ? "지금 예매를 검토하세요" : "아직 없음" },
        { k: "가장 근접한 노선", v: bestDeal ? bestDeal.route.name : "-",
          d: bestDeal ? `현재 ${FlightData.won(bestDeal.s.current)}` : "" },
      ];
      $("statsRow").innerHTML = stats.map((st) =>
        `<div class="card stat fade-in"><div class="k">${st.k}</div><div class="v">${st.v}</div><div class="d">${st.d}</div></div>`).join("");
    }

    /* ---------- 노선 카드 목록 ---------- */
    function renderGrid() {
      const routes = visibleRoutes();
      const grid = $("routeGrid");
      grid.innerHTML = "";
      $("routeCount").textContent = `${routes.length}개 노선`;
      if (!routes.length) {
        $("emptyState").innerHTML = `
          <div class="card empty">${ICONS.bell}
            <h3>관심 노선이 없어요</h3>
            <p>위 <strong>관심 노선 추가</strong> 버튼으로 지금 바로 등록해보세요.</p></div>`;
      } else {
        $("emptyState").innerHTML = "";
        routes.forEach((r) => grid.append(renderCard(r)));
      }
      $("hiddenInfo").style.display = hidden.size ? "" : "none";
      $("hiddenCount").textContent = hidden.size;
      renderStats();
    }

    $("restoreLink").addEventListener("click", (e) => {
      e.preventDefault(); hidden = new Set(); FlightData.setHidden(hidden); renderGrid();
      toast("숨긴 노선을 모두 복원했어요");
    });

    /* 관심 노선 추가 */
    $("addBtn").addEventListener("click", async () => {
      const cfg = await openRouteForm({});
      if (!cfg) return;
      FlightData.upsertMyRoute(cfg);
      toast("추가됐어요! 가격을 가져오는 중…");
      try { await fetchLiveFor({ ...cfg }, true); } catch (e) { toast("가격 조회는 나중에: " + e.message); }
      await reload();
    });

    function renderCard(route) {
      const s = FlightData.routeStats(route);
      const card = document.createElement("div");
      card.className = "card route-card fade-in";
      const deltaCls = s.deltaFromPrev < 0 ? "delta-down" : s.deltaFromPrev > 0 ? "delta-up" : "";
      const deltaIco = s.deltaFromPrev < 0 ? ICONS.down : s.deltaFromPrev > 0 ? ICONS.up : "";
      const kindBadge = route._local ? ""
        : '<span class="badge badge-off" style="background:color-mix(in srgb,var(--blue-500) 12%,transparent);color:var(--blue-500)">서버수집</span>';
      const statusBadge = s.hitTarget ? '<span class="badge badge-hit">🎯 목표가 도달</span>'
                        : '<span class="badge badge-active">자동 모니터링중</span>';
      const sig = FlightData.buySignal(s, route);
      const liveTag = route._liveTs
        ? `<span class="live-tag">· ${Math.max(1, Math.round((Date.now() - route._liveTs) / 60000))}분 전 갱신</span>` : "";

      card.innerHTML = `
        <div class="rc-top">
          <div>
            <div class="route-path"><span>${route.origin}</span>
              <span class="plane">${ICONS.plane}</span><span>${route.destination}</span></div>
            <div class="route-sub">${route.name} · ${FlightData.shortDate(route.departDate)}${route.returnDate ? "~" + FlightData.shortDate(route.returnDate) : ""} · 성인 ${route.passengers || 1}</div>
            <div style="margin-top:6px;display:flex;gap:6px">${kindBadge}${statusBadge}</div>
          </div>
          <div class="rc-actions">
            <button class="icon-mini rc-edit" title="목표가·설정 편집" style="color:var(--text-3)">${ICONS.edit}</button>
            <button class="icon-mini rc-del" title="삭제">${ICONS.trash}</button>
          </div>
        </div>
        <div class="price-row">
          <span class="price-now">${FlightData.won(s.current)}</span>
          <span style="font-size:.72rem;color:var(--text-3);font-weight:700">1인당</span>
          ${s.deltaFromPrev ? `<span class="price-delta ${deltaCls}">${deltaIco}${FlightData.won(Math.abs(s.deltaFromPrev))}</span>` : ""}
        </div>
        <div class="route-sub" style="color:var(--${sig.tone === 'down' ? 'down' : sig.tone === 'up' ? 'up' : 'text-2'})">${sig.text} ${liveTag}</div>
        <div class="sparkholder"></div>
        <div class="target-line">${ICONS.target} 목표 ${route.targetPrice != null ? FlightData.won(route.targetPrice) : "미설정"} · 최저 ${FlightData.won(s.min)}</div>
        <div class="progress"><span style="width:${s.progress}%"></span></div>
        <div class="rc-foot">
          <a class="btn btn-ghost" href="detail.html?id=${encodeURIComponent(route.id)}">${ICONS.chart} 추이</a>
          <button class="btn btn-primary rc-refresh">${ICONS.refresh} 재검색</button>
        </div>
        <button class="btn btn-accent rc-book" style="width:100%;justify-content:center">${ICONS.external} 네이버항공권에서 예약하기</button>
        <div class="site-links rc-sites" style="margin-top:2px"></div>`;

      card.querySelector(".sparkholder").append(
        Chart.sparkline(s.prices.map((p) => p.price), { color: s.hitTarget ? "var(--down)" : "var(--blue-500)" }));

      const q = DeepLink.routeToQuery(route);

      // 편집: 로컬은 전체 폼 / 자동수집은 목표가만 (override)
      card.querySelector(".rc-edit").addEventListener("click", async () => {
        if (route._local) {
          const cfg = await openRouteForm(route);
          if (!cfg) return;
          FlightData.upsertMyRoute(cfg);
          await reload();
          toast("수정됐어요");
        } else {
          const cur = route.targetPrice != null ? route.targetPrice : "";
          const v = prompt(`'${route.name}' 목표가(원, 1인당)를 입력하세요`, cur);
          if (v === null) return;
          FlightData.setOverride(route.id, { targetPrice: v.trim() === "" ? null : Number(v) });
          await reload();
          toast("목표가를 저장했어요");
        }
      });

      // 삭제: 로컬은 완전 삭제 / 자동수집은 화면에서 숨김
      card.querySelector(".rc-del").addEventListener("click", async () => {
        if (route._local) {
          if (!confirm(`'${route.name}' 노선을 삭제할까요? (가격 기록도 함께 삭제됩니다)`)) return;
          FlightData.removeMyRoute(route.id);
          await reload();
          toast(`🗑 ${route.name} 삭제됨`);
        } else {
          if (!confirm(`'${route.name}' 노선을 목록에서 숨길까요?\n(자동수집 노선입니다. 수집까지 멈추려면 routes.json에서 제거하세요)`)) return;
          hidden.add(route.id); FlightData.setHidden(hidden); renderGrid();
          toast(`${route.name} 숨김 — 아래에서 복원 가능`);
        }
      });

      // 재검색 = 페이지 이동 없이 정보만 갱신
      const refreshBtn = card.querySelector(".rc-refresh");
      refreshBtn.addEventListener("click", async () => {
        if (!AirApi.isConfigured()) { toast("실시간 갱신은 검색 페이지의 ⚙️ 설정 후 사용할 수 있어요"); return; }
        refreshBtn.disabled = true; refreshBtn.innerHTML = ICONS.refresh + " 갱신 중…";
        try {
          await fetchLiveFor(route, true);
          const live = JSON.parse(localStorage.getItem("airbot.live." + route.id));
          FlightData.applyLive(route, live);
          card.replaceWith(renderCard(route));
          renderStats();
          toast(`✓ ${route.name} 갱신됐어요`);
        } catch (e) {
          refreshBtn.disabled = false; refreshBtn.innerHTML = ICONS.refresh + " 재검색";
          toast("갱신 실패: " + e.message);
        }
      });

      card.querySelector(".rc-book").addEventListener("click", () => {
        openTab(DeepLink.bookingLink(q), false); toast(`🎫 ${route.name} 예약 페이지로 이동`);
      });

      renderSiteButtons(card.querySelector(".rc-sites"), q);
      card.querySelectorAll(".rc-sites .mini-btn").forEach((b) => { b.style.padding = "7px 11px"; b.style.fontSize = ".78rem"; });
      return card;
    }

    await reload();

    // 앱을 열면 오늘 아직 안 받아온 노선을 자동으로 갱신
    if (AirApi.isConfigured()) {
      const routes = visibleRoutes();
      if (routes.length) {
        const n = await AirApi.autoRefreshAll(routes);
        if (n) { await reload(); toast(`✓ ${n}개 노선 자동 갱신됨`); }
      }
    }
  })();
  </script>
</body>
</html>
